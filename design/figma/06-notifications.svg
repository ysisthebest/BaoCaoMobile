<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; }
      .bg { fill: #0f1720; }
      .surface { fill: #f6f1e8; }
      .surface-muted { fill: #ebe1d2; }
      .soft-card { fill: #fbf5eb; stroke: #efe0cc; stroke-width: 1; }
      .field { fill: #fcf6ed; stroke: #dbcdbb; stroke-width: 1; }
      .ghost { fill: #fffaf2; stroke: #dbcdbb; stroke-width: 1; }
      .hero-green { fill: #193a36; }
      .hero-slate { fill: #263640; }
      .dark { fill: #15242a; }
      .dark-soft { fill: #22313b; stroke: #314756; stroke-width: 1; }
      .green { fill: #d7eadf; }
      .orange { fill: #ffd8b0; }
      .warning { fill: #fff4e8; stroke: #f1cfab; stroke-width: 1; }
      .danger-card { fill: #ffe8e1; stroke: #eab8aa; stroke-width: 1; }
      .track { fill: #eadfce; }
      .success-fill { fill: #2f7d4f; }
      .accent-fill { fill: #ff7a30; }
      .danger-fill { fill: #b54a25; }
      .stroke-line { stroke: #efe5d7; stroke-width: 1; }
      .t-on-dark { fill: #f8f4ec; }
      .t-primary { fill: #1b1b1b; }
      .t-secondary { fill: #6a6256; }
      .t-accent { fill: #ca5a1d; }
      .t-success { fill: #2f7d4f; }
      .t-danger { fill: #b54a25; }
      .eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
      .h1 { font-size: 30px; font-weight: 800; }
      .h1-sm { font-size: 28px; font-weight: 800; }
      .h2 { font-size: 20px; font-weight: 800; }
      .title { font-size: 16px; font-weight: 800; }
      .label { font-size: 13px; font-weight: 700; }
      .body { font-size: 13px; font-weight: 600; }
      .small { font-size: 12px; font-weight: 700; }
      .tiny { font-size: 11px; font-weight: 600; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="390" height="844" />
  
  <g transform="translate(20 44)">
    <text class="t-on-dark h1-sm" x="0" y="34" text-anchor="start">Thông báo</text>

    <rect class="warning" x="0" y="72" width="350" height="112" rx="22" />
    <circle cx="28" cy="100" r="12" fill="#ff7a30" />
    <text class="t-primary title" x="52" y="100" text-anchor="start">Cảnh báo ngân sách ăn uống</text>
    <text class="t-secondary body" x="52" y="124" text-anchor="start">Bạn đã dùng 86% ngân sách tháng 05.</text>

    <rect class="danger-card" x="0" y="200" width="350" height="112" rx="22" />
    <circle cx="28" cy="228" r="12" fill="#b54a25" />
    <text class="t-primary title" x="52" y="228" text-anchor="start">Vượt ngân sách di chuyển</text>
    <text class="t-secondary body" x="52" y="252" text-anchor="start">Chi tiêu đã vượt 230.000 đ so với hạn mức.</text>

    <rect class="warning" x="0" y="328" width="350" height="112" rx="22" />
    <circle cx="28" cy="356" r="12" fill="#ff7a30" />
    <text class="t-primary title" x="52" y="356" text-anchor="start">Danh mục mua sắm sắp chạm trần</text>
    <text class="t-secondary body" x="52" y="380" text-anchor="start">Nên rà soát các khoản chi trong tuần này.</text>
  </g>
  
  <rect x="0" y="760" width="390" height="84" fill="rgba(15,23,32,0.92)" />
  <rect x="14" y="772" width="362" height="56" rx="28" fill="#111b22" stroke="#223240" stroke-width="1" />
  <text class="t-secondary tiny" x="55" y="807" text-anchor="middle">Tổng quan</text>
<text class="t-secondary tiny" x="135" y="807" text-anchor="middle">Giao dịch</text>
<text class="t-on-dark tiny" x="228" y="807" text-anchor="middle">Thông báo</text>
<text class="t-secondary tiny" x="315" y="807" text-anchor="middle">Ngân sách</text>
  
  
</svg>
