    <rect class="ghost" x="208" y="516" width="82" height="34" rx="17" />
    <text class="t-secondary small" x="249" y="538" text-anchor="middle">Khác</text>

    <text class="t-primary label" x="16" y="592" text-anchor="start">Tiền từ</text>
    <rect class="field" x="16" y="602" width="153" height="42" rx="16" />
    <text class="t-secondary body" x="28" y="628" text-anchor="start">0</text>
    <text class="t-primary label" x="181" y="592" text-anchor="start">Đến</text>
    <rect class="field" x="181" y="602" width="153" height="42" rx="16" />
    <text class="t-secondary body" x="193" y="628" text-anchor="start">5000000</text>

    <rect class="surface" x="0" y="660" width="350" height="84" rx="24" />
    <text class="t-primary h2" x="16" y="692" text-anchor="start">Danh sách giao dịch</text>
    <rect class="soft-card" x="16" y="706" width="318" height="20" rx="10" />
  </g>

  <g transform="translate(20 322)">
    <text class="t-primary label" x="16" y="154" text-anchor="start">Danh mục</text>
    <rect class="surface" x="0" y="170" width="350" height="236" rx="24" />
    <rect class="soft-card" x="16" y="62" width="318" height="116" rx="20" />
    <circle cx="34" cy="84" r="18" fill="#ffe3d7" />
    <text class="t-primary title" x="60" y="84" text-anchor="start">Tiền ăn</text>
    <text class="t-secondary body" x="60" y="104" text-anchor="start">Ăn uống • 13/05/2026</text>
    <text class="t-danger small" x="278" y="84" text-anchor="start">-250.000 đ</text>
    <text class="t-primary body" x="60" y="130" text-anchor="start">Bữa trưa và cà phê</text>
    <text class="t-accent small" x="60" y="154" text-anchor="start">Chi tiết</text>
    <text class="t-accent small" x="126" y="154" text-anchor="start">Sửa</text>
    <text class="t-danger small" x="168" y="154" text-anchor="start">Xóa</text>

    <rect class="soft-card" x="16" y="190" width="318" height="116" rx="20" />
    <circle cx="34" cy="212" r="18" fill="#def2e5" />
    <text class="t-primary title" x="60" y="212" text-anchor="start">Lương tháng</text>
    <text class="t-secondary body" x="60" y="232" text-anchor="start">Thu nhập • 01/05/2026</text>
    <text class="t-success small" x="278" y="212" text-anchor="start">+7.000.000 đ</text>
    <text class="t-primary body" x="60" y="258" text-anchor="start">Chuyển khoản công ty</text>
    <text class="t-accent small" x="60" y="282" text-anchor="start">Chi tiết</text>
    <text class="t-accent small" x="126" y="282" text-anchor="start">Sửa</text>
    <text class="t-danger small" x="168" y="282" text-anchor="start">Xóa</text>
  </g>
  
  <rect x="0" y="760" width="390" height="84" fill="rgba(15,23,32,0.92)" />
  <rect x="14" y="772" width="362" height="56" rx="28" fill="#111b22" stroke="#223240" stroke-width="1" />
  <text class="t-secondary tiny" x="55" y="807" text-anchor="middle">Tổng quan</text>
<text class="t-on-dark tiny" x="135" y="807" text-anchor="middle">Giao dịch</text>
<text class="t-secondary tiny" x="228" y="807" text-anchor="middle">Thông báo</text>
<text class="t-secondary tiny" x="315" y="807" text-anchor="middle">Ngân sách</text>
  
  
</svg>
