    <rect x="28" y="514" width="278" height="10" rx="5" fill="#eadfce" />
    <rect x="28" y="514" width="166" height="10" rx="5" fill="#2f7d4f" />

    <rect class="surface" x="0" y="566" width="350" height="178" rx="24" />
    <text class="t-primary h2" x="16" y="598" text-anchor="start">Tất cả ngân sách</text>
    <text class="t-primary title" x="16" y="634" text-anchor="start">Ăn uống</text>
    <text class="t-secondary body" x="16" y="654" text-anchor="start">2026-05 • 2.000.000 đ</text>
    <text class="t-accent small" x="274" y="642" text-anchor="start">Sửa</text>
    <text class="t-danger small" x="308" y="642" text-anchor="start">Xóa</text>
    <line class="stroke-line" x1="16" y1="668" x2="334" y2="668" />
    <text class="t-primary title" x="16" y="700" text-anchor="start">Nhà ở</text>
    <text class="t-secondary body" x="16" y="720" text-anchor="start">2026-05 • 1.500.000 đ</text>
    <text class="t-accent small" x="274" y="708" text-anchor="start">Sửa</text>
    <text class="t-danger small" x="308" y="708" text-anchor="start">Xóa</text>
