<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; }
      .bg { fill: #0f1720; }
      .surface { fill: #f6f1e8; }
      .surface-muted { fill: #ebe1d2; }
      .soft-card { fill: #fbf5eb; stroke: #efe0cc; stroke-width: 1; }
      .field { fill: #fcf6ed; stroke: #dbcdbb; stroke-width: 1; }
      .ghost { fill: #fffaf2; stroke: #dbcdbb; stroke-width: 1; }
      .hero-green { fill: #193a36; }
      .hero-slate { fill: #263640; }
      .dark { fill: #15242a; }
      .dark-soft { fill: #22313b; stroke: #314756; stroke-width: 1; }
      .green { fill: #d7eadf; }
      .orange { fill: #ffd8b0; }
      .warning { fill: #fff4e8; stroke: #f1cfab; stroke-width: 1; }
      .danger-card { fill: #ffe8e1; stroke: #eab8aa; stroke-width: 1; }
      .track { fill: #eadfce; }
      .success-fill { fill: #2f7d4f; }
      .accent-fill { fill: #ff7a30; }
      .danger-fill { fill: #b54a25; }
      .stroke-line { stroke: #efe5d7; stroke-width: 1; }
      .t-on-dark { fill: #f8f4ec; }
      .t-primary { fill: #1b1b1b; }
      .t-secondary { fill: #6a6256; }
      .t-accent { fill: #ca5a1d; }
      .t-success { fill: #2f7d4f; }
      .t-danger { fill: #b54a25; }
      .eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
      .h1 { font-size: 30px; font-weight: 800; }
      .h1-sm { font-size: 28px; font-weight: 800; }
      .h2 { font-size: 20px; font-weight: 800; }
      .title { font-size: 16px; font-weight: 800; }
      .label { font-size: 13px; font-weight: 700; }
      .body { font-size: 13px; font-weight: 600; }
      .small { font-size: 12px; font-weight: 700; }
      .tiny { font-size: 11px; font-weight: 600; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="390" height="844" />
  
  <g transform="translate(20 44)">
    <rect class="hero-green" x="0" y="0" width="350" height="92" rx="30" />
    <text class="t-on-dark eyebrow" x="22" y="34" text-anchor="start">Xin chào, Tinh</text>
    <text class="t-on-dark h1-sm" x="0" y="140" text-anchor="start">Tổng quan</text>

    <rect class="dark" x="0" y="160" width="350" height="86" rx="22" />
    <text class="t-on-dark small" x="16" y="190" text-anchor="start">Số dư hiện tại</text>
    <text class="t-on-dark h2" x="16" y="222" text-anchor="start">12.500.000 đ</text>

    <rect class="green" x="0" y="258" width="169" height="86" rx="22" />
    <text class="t-primary small" x="16" y="288" text-anchor="start">Tổng thu tháng</text>
    <text class="t-primary h2" x="16" y="320" text-anchor="start">7.000.000 đ</text>

    <rect class="orange" x="181" y="258" width="169" height="86" rx="22" />
    <text class="t-primary small" x="197" y="288" text-anchor="start">Tổng chi tháng</text>
    <text class="t-primary h2" x="197" y="320" text-anchor="start">4.500.000 đ</text>

    <rect class="surface" x="0" y="360" width="350" height="216" rx="24" />
    <text class="t-primary h2" x="16" y="392" text-anchor="start">Tổng quan nhanh</text>
    <rect class="soft-card" x="16" y="408" width="152" height="74" rx="18" />
    <text class="t-secondary small" x="28" y="430" text-anchor="start">Biến động chi</text>
    <text class="t-primary title" x="28" y="458" text-anchor="start">+12%</text>
    <text class="t-secondary tiny" x="28" y="474" text-anchor="start">so với tháng trước</text>
    <rect class="soft-card" x="182" y="408" width="152" height="74" rx="18" />
    <text class="t-secondary small" x="194" y="430" text-anchor="start">Số giao dịch</text>
    <text class="t-primary title" x="194" y="458" text-anchor="start">24</text>
    <text class="t-secondary tiny" x="194" y="474" text-anchor="start">trong tháng hiện tại</text>
    <rect class="soft-card" x="16" y="494" width="152" height="74" rx="18" />
    <text class="t-secondary small" x="28" y="516" text-anchor="start">Chi tiêu trung bình</text>
    <text class="t-primary title" x="28" y="544" text-anchor="start">185.000 đ</text>
    <text class="t-secondary tiny" x="28" y="560" text-anchor="start">mỗi khoản chi</text>
    <rect class="soft-card" x="182" y="494" width="152" height="74" rx="18" />
    <text class="t-secondary small" x="194" y="516" text-anchor="start">Ngân sách vượt mức</text>
    <text class="t-primary title" x="194" y="544" text-anchor="start">1</text>
    <text class="t-secondary tiny" x="194" y="560" text-anchor="start">danh mục cần chú ý</text>

    <rect class="surface" x="0" y="592" width="350" height="152" rx="24" />
    <text class="t-primary title" x="16" y="624" text-anchor="start">Biểu đồ thu chi theo tháng</text>
    <text class="t-accent small" x="292" y="624" text-anchor="middle">Xem giao dịch</text>
    <rect class="soft-card" x="16" y="638" width="318" height="88" rx="18" />
    <rect x="46" y="692" width="16" height="20" rx="8" fill="#2f7d4f" />
    <rect x="68" y="676" width="16" height="36" rx="8" fill="#ff7a30" />
    <rect x="116" y="664" width="16" height="48" rx="8" fill="#2f7d4f" />
    <rect x="138" y="684" width="16" height="28" rx="8" fill="#ff7a30" />
    <rect x="186" y="646" width="16" height="66" rx="8" fill="#2f7d4f" />
    <rect x="208" y="670" width="16" height="42" rx="8" fill="#ff7a30" />
    <rect x="256" y="658" width="16" height="54" rx="8" fill="#2f7d4f" />
    <rect x="278" y="680" width="16" height="32" rx="8" fill="#ff7a30" />
  </g>
  
  <rect x="0" y="760" width="390" height="84" fill="rgba(15,23,32,0.92)" />
  <rect x="14" y="772" width="362" height="56" rx="28" fill="#111b22" stroke="#223240" stroke-width="1" />
  <text class="t-on-dark tiny" x="55" y="807" text-anchor="middle">Tổng quan</text>
<text class="t-secondary tiny" x="135" y="807" text-anchor="middle">Giao dịch</text>
<text class="t-secondary tiny" x="228" y="807" text-anchor="middle">Thông báo</text>
<text class="t-secondary tiny" x="315" y="807" text-anchor="middle">Ngân sách</text>
  
  
</svg>
