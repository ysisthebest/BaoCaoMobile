  <rect class="bg" x="0" y="0" width="390" height="844" />
  
  <g transform="translate(20 44)">
    <text class="t-on-dark h1-sm" x="0" y="34" text-anchor="start">Ngân sách</text>
    <rect class="dark-soft" x="226" y="0" width="124" height="40" rx="16" />
    <text class="t-on-dark tiny" x="288" y="25" text-anchor="middle">Quản lý danh mục</text>

