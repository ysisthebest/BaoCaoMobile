<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; }
      .bg { fill: #0f1720; }
      .surface { fill: #f6f1e8; }
      .surface-muted { fill: #ebe1d2; }
      .soft-card { fill: #fbf5eb; stroke: #efe0cc; stroke-width: 1; }
      .field { fill: #fcf6ed; stroke: #dbcdbb; stroke-width: 1; }
      .ghost { fill: #fffaf2; stroke: #dbcdbb; stroke-width: 1; }
      .hero-green { fill: #193a36; }
      .hero-slate { fill: #263640; }
      .dark { fill: #15242a; }
      .dark-soft { fill: #22313b; stroke: #314756; stroke-width: 1; }
      .green { fill: #d7eadf; }
      .orange { fill: #ffd8b0; }
      .warning { fill: #fff4e8; stroke: #f1cfab; stroke-width: 1; }
      .danger-card { fill: #ffe8e1; stroke: #eab8aa; stroke-width: 1; }
      .track { fill: #eadfce; }
      .success-fill { fill: #2f7d4f; }
      .accent-fill { fill: #ff7a30; }
      .danger-fill { fill: #b54a25; }
      .stroke-line { stroke: #efe5d7; stroke-width: 1; }
      .t-on-dark { fill: #f8f4ec; }
      .t-primary { fill: #1b1b1b; }
      .t-secondary { fill: #6a6256; }
      .t-accent { fill: #ca5a1d; }
      .t-success { fill: #2f7d4f; }
      .t-danger { fill: #b54a25; }
      .eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
      .h1 { font-size: 30px; font-weight: 800; }
      .h1-sm { font-size: 28px; font-weight: 800; }
      .h2 { font-size: 20px; font-weight: 800; }
      .title { font-size: 16px; font-weight: 800; }
      .label { font-size: 13px; font-weight: 700; }
      .body { font-size: 13px; font-weight: 600; }
      .small { font-size: 12px; font-weight: 700; }
      .tiny { font-size: 11px; font-weight: 600; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="390" height="844" />
  
  <g transform="translate(20 120)">
    <rect class="hero-slate" x="0" y="0" width="350" height="120" rx="30" />
    <circle cx="40" cy="38" r="22" fill="rgba(255,255,255,0.12)" />
    <text class="t-on-dark h1" x="22" y="84" text-anchor="start">Tạo tài khoản mới</text>

    <rect class="surface" x="0" y="140" width="350" height="350" rx="24" />
    <text class="t-primary label" x="18" y="176" text-anchor="start">Họ và tên</text>
    <rect class="field" x="18" y="186" width="314" height="44" rx="16" />
    <text class="t-secondary body" x="30" y="214" text-anchor="start">Nguyễn Văn A</text>
    <text class="t-primary label" x="18" y="258" text-anchor="start">Email</text>
    <rect class="field" x="18" y="268" width="314" height="44" rx="16" />
    <text class="t-secondary body" x="30" y="296" text-anchor="start">example@gmail.com</text>
    <text class="t-primary label" x="18" y="340" text-anchor="start">Mật khẩu</text>
    <rect class="field" x="18" y="350" width="314" height="44" rx="16" />
    <text class="t-secondary body" x="30" y="378" text-anchor="start">Tạo mật khẩu</text>
    <rect x="18" y="410" width="314" height="48" rx="18" fill="#ff7a30" />
    <text class="t-on-dark label" x="175" y="440" text-anchor="middle">Đăng ký</text>
    <text class="t-accent label" x="175" y="478" text-anchor="middle">Đã có tài khoản? Đăng nhập</text>
  </g>
  
</svg>
